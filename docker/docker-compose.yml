version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sweeter-postgres
    environment:
      POSTGRES_DB: sweeter_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwertyuiop1234567890
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sweeter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweeteruser -d sweeterdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sweeter-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost/sweeter_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: qwertyuiop1234567890
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sweeter-network
    volumes:
      - app-uploads:/app/uploads

networks:
  sweeter-network:
    driver: bridge

volumes:
  postgres-data:
  app-uploads: